<!DOCTYPE html>
<html>
<head>
<title>MEHAB</title>
<style>
body {
font-family: Arial;
background: #0f172a;
color: white;
text-align: center;
padding-top: 50px;
}

.container {
background: #1e293b;
padding: 40px;
border-radius: 12px;
width: 600px;
margin: auto;
}

input {
padding: 12px;
width: 400px;
border-radius: 8px;
border: none;
}

button {
padding: 12px 20px;
background: #22c55e;
border: none;
border-radius: 8px;
color: white;
cursor: pointer;
}

.result {
margin-top: 30px;
background: #0f172a;
padding: 20px;
border-radius: 10px;
display:none;
}
</style>
</head>

<body>

<div class="container">
<h1>MEHAB</h1>
<p>SEO & Competitor Intelligence</p>

<input id="website" placeholder="Enter Website URL" />
<br><br>
<button onclick="analyze()">Analyze</button>

<div class="result" id="result">
<h3>SEO Score: 78%</h3>
<p>Keywords: transport, employee transport, cab services</p>
<p>Competitor: eurocab.in, ecosmobility.com</p>
</div>

</div>

<script>
function analyze(){
document.getElementById("result").style.display="block";
}
</script>

</body>
</html>
