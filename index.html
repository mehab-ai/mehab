<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MEHAB</title>

<style>
body {
font-family: Arial, sans-serif;
background-color: #0f172a;
color: white;
text-align: center;
padding-top: 50px;
}

.container {
background-color: #1e293b;
padding: 30px;
border-radius: 10px;
width: 500px;
margin: auto;
}

input {
padding: 10px;
width: 80%;
border-radius: 6px;
border: none;
margin-top: 10px;
}

button {
padding: 10px 20px;
background-color: #22c55e;
border: none;
border-radius: 6px;
color: white;
margin-top: 15px;
cursor: pointer;
}

.result {
margin-top: 20px;
background-color: #0f172a;
padding: 15px;
border-radius: 8px;
display: none;
}
</style>

</head>

<body>

<div class="container">
<h1>MEHAB</h1>
<p>SEO & Competitor Intelligence</p>

<input id="website" type="text" placeholder="Enter Website URL">
<br>

<button onclick="analyze()">Analyze</button>

<div class="result" id="result">
<h3>SEO Score: 78%</h3>
<p>Keywords: transport, employee transport, cab services</p>
<p>Competitors: eurocab.in, ecosmobility.com</p>
</div>

</div>

<script>
function analyze() {
document.getElementById("result").style.display = "block";
}
</script>

</body>
</html>
