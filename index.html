<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MEHAB SEO</title>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: white; padding: 50px; text-align: center; }
        .container { background: #1e293b; padding: 30px; border-radius: 10px; display: inline-block; width: 400px; }
        input { width: 90%; padding: 10px; margin-bottom: 10px; border-radius: 5px; border: none; }
        button { padding: 10px 20px; background: #22c55e; color: white; border: none; border-radius: 5px; cursor: pointer; }
        .result { margin-top: 20px; padding: 15px; background: #020617; border-radius: 5px; text-align: left; }
        /* This hides the result by default */
        #result { display: none; }
    </style>
</head>
<body>

    <div class="container">
        <h1>MEHAB</h1>
        <p>SEO & Competitor Intelligence</p>
        
        <input type="text" id="website" placeholder="Enter URL here...">
        <br>
        <button type="button" onclick="analyze()">Analyze</button>

        <div id="result" class="result">
            <h3 style="color: #22c55e;">SEO Score: 78%</h3>
            <p><strong>Keywords:</strong> transport, cab services</p>
            <p><strong>Competitors:</strong> eurocab.in, ecosmobility.com</p>
        </div>
    </div>

    <script>
        function analyze() {
            // 1. Grab the input and the result div
            const siteInput = document.getElementById('website').value;
            const resultDiv = document.getElementById('result');

            // 2. Simple check: if input is empty, alert user
            if (siteInput.trim() === "") {
                alert("Please enter a website URL first!");
            } else {
                // 3. Show the hidden div
                resultDiv.style.display = "block";
            }
        }
    </script>

</body>
</html>
