<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MEHAB</title>

<style>
* {
margin: 0;
padding: 0;
box-sizing: border-box;
}

body {
font-family: Arial, sans-serif;
background: #0f172a;
color: white;
display: flex;
justify-content: center;
align-items: center;
height: 100vh;
}

.container {
background: #1e293b;
padding: 40px;
border-radius: 12px;
text-align: center;
width: 500px;
}

h1 {
margin-bottom: 10px;
}

p {
margin-bottom: 20px;
color: #cbd5e1;
}

input {
width: 100%;
padding: 12px;
border-radius: 8px;
border: none;
margin-bottom: 15px;
}

button {
background: #22c55e;
color: white;
border: none;
padding: 12px 20px;
border-radius: 8px;
cursor: pointer;
}

button:hover {
background: #16a34a;
}

.result {
margin-top: 20px;
padding: 20px;
background: #0f172a;
border-radius: 8px;
display: none;
}
</style>

</head>

<body>

<div class="container">
<h1>MEHAB</h1>
<p>SEO & Competitor Intelligence</p>

<input id="website" type="text" placeholder="Enter website URL">

<button onclick="analyze()">Analyze</button>

<div class="result" id="result">
<h3>SEO Score: 78%</h3>
<p>Keywords: transport, employee transport, cab services</p>
<p>Competitors: eurocab.in, ecosmobility.com</p>
</div>

</div>

<script>
function analyze() {
document.getElementById("result").style.display = "block";
}
</script>

</body>
</html>
